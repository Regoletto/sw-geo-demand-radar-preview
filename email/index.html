<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>用 GEO 找出客户需求</title>
  </head>
  <body style="margin:0; padding:0; background:#f4f1ea;">
    <center style="width:100%; background:#f4f1ea;">
      <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="border-collapse:collapse;">
        <tr>
          <td align="center" style="padding:34px 14px;">
            <table role="presentation" width="660" cellspacing="0" cellpadding="0" border="0" style="width:660px; max-width:100%; border-collapse:collapse; background:#ffffff;">
              <tr>
                <td style="padding:0;">
                  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="border-collapse:collapse;">
                    <tr>
                      <td style="background:#161a1f; padding:24px 30px 30px; font-family:Arial, 'Microsoft YaHei', sans-serif;">
                        <div style="color:#ffffff; font-size:18px; font-weight:700; margin-bottom:34px;">SOLIDWORKS</div>
                        <div style="color:#9be7ed; font-size:12px; font-weight:700; letter-spacing:1.8px; text-transform:uppercase; margin-bottom:12px;">
                          GEO Demand Radar
                        </div>
                        <h1 style="margin:0 0 16px; color:#ffffff; font-size:44px; line-height:1.08; font-weight:800;">
                          用 GEO 找出<br />客户需求
                        </h1>
                        <p style="margin:0; color:#dfe6eb; font-size:18px; line-height:1.7;">
                          看看你的客户正在向 AI 提出哪些问题，以及这些问题背后的采购顾虑。
                        </p>
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>

              <tr>
                <td style="padding:26px 30px 4px; font-family:Arial, 'Microsoft YaHei', sans-serif;">
                  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="border-collapse:collapse;">
                    <tr>
                      <td width="50%" valign="top" style="padding:0 8px 16px 0;">
                        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="border-collapse:collapse; background:#fff0f0; border-left:7px solid #d71920;">
                          <tr>
                            <td style="padding:20px;">
                              <div style="color:#d71920; font-size:12px; font-weight:700; letter-spacing:1.4px; margin-bottom:10px;">客户可能会问</div>
                              <div style="color:#161a1f; font-size:22px; line-height:1.28; font-weight:800;">工厂想上机器人，怎么选型号？</div>
                            </td>
                          </tr>
                        </table>
                      </td>
                      <td width="50%" valign="top" style="padding:22px 0 16px 8px;">
                        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="border-collapse:collapse; background:#161a1f;">
                          <tr>
                            <td style="padding:22px;">
                              <div style="color:#9be7ed; font-size:12px; font-weight:700; letter-spacing:1.4px; margin-bottom:10px;">GEO 信号</div>
                              <div style="color:#ffffff; font-size:20px; line-height:1.35; font-weight:800;">短问题背后，是采购风险和使用顾虑。</div>
                            </td>
                          </tr>
                        </table>
                      </td>
                    </tr>
                    <tr>
                      <td width="50%" valign="top" style="padding:0 8px 16px 0;">
                        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="border-collapse:collapse; background:#f7f8f8; border:1px solid #d8dee4;">
                          <tr>
                            <td style="padding:20px;">
                              <div style="color:#d71920; font-size:12px; font-weight:700; letter-spacing:1.4px; margin-bottom:10px;">输出内容</div>
                              <div style="color:#161a1f; font-size:18px; line-height:1.45; font-weight:800;">客户问题、采购顾虑、SOLIDWORKS 对应方案</div>
                            </td>
                          </tr>
                        </table>
                      </td>
                      <td width="50%" valign="top" style="padding:0 0 16px 8px;">
                        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="border-collapse:collapse; background:#d71920;">
                          <tr>
                            <td style="padding:28px 22px;">
                              <div style="color:#ffffff; font-size:12px; font-weight:700; letter-spacing:1.4px; margin-bottom:10px;">点击后</div>
                              <div style="color:#ffffff; font-size:24px; line-height:1.22; font-weight:800;">输入行业，即可查看需求信号。</div>
                            </td>
                          </tr>
                        </table>
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>

              <tr>
                <td style="padding:12px 30px 34px; font-family:Arial, 'Microsoft YaHei', sans-serif;">
                  <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="border-collapse:collapse;">
                    <tr>
                      <td bgcolor="#d71920" style="background:#d71920;">
                        <a href="../" target="_blank" style="display:inline-block; padding:17px 28px; color:#ffffff; font-size:16px; font-weight:700; text-decoration:none;">
                          点击看答案
                        </a>
                      </td>
                    </tr>
                  </table>
                  <p style="margin:20px 0 0; color:#69727b; font-size:13px; line-height:1.65;">
                    输入行业即可查看你的客户在 AI 搜索中暴露出的需求信号，并获得对应的 SOLIDWORKS 解决方案入口。
                  </p>
                </td>
              </tr>

              <tr>
                <td style="background:#f1f3f4; padding:18px 30px; font-family:Arial, 'Microsoft YaHei', sans-serif;">
                  <p style="margin:0; color:#69727b; font-size:12px; line-height:1.6;">
                    本邮件由达索系统 SOLIDWORKS 发送。若你不希望继续收到相关信息，请联系发送方取消订阅。
                  </p>
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
    </center>
  </body>
</html>
