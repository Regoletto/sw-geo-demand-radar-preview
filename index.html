<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>用 GEO 找出客户需求 | SOLIDWORKS</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="styles.css?v=20260629-4" />
  </head>
  <body>
    <main class="page-shell">
      <section class="landing-hero">
        <p class="brand-kicker">SOLIDWORKS GEO Demand Radar</p>
        <h1>用 GEO 找出客户需求</h1>
        <p class="hero-lede">
          输入你的行业，查看你的客户在 AI 搜索中暴露出的需求信号、采购顾虑，以及 SOLIDWORKS 可对应的解决方案。
        </p>

        <form class="input-panel" id="radarForm">
          <label class="field">
            <span>行业</span>
            <input
              id="industry"
              name="industry"
              type="text"
              autocomplete="organization-title"
              placeholder="例如：机器人、医疗设备、汽车零部件"
              required
            />
          </label>

          <label class="field">
            <span>公司邮箱</span>
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="email"
              placeholder="name@company.com"
              required
            />
          </label>

          <label class="consent">
            <input id="consent" name="consent" type="checkbox" required />
            <span>我同意 SOLIDWORKS 使用我的邮箱发送本次分析结果及相关行业资料。</span>
          </label>

          <button class="primary-button" type="submit">
            <span>查看行业需求</span>
          </button>
        </form>
      </section>

      <section class="progress-panel hidden" id="progressPanel" aria-live="polite">
        <div class="progress-copy">
          <p>GEO 需求雷达运行中</p>
          <h2 id="progressTitle">识别行业场景</h2>
        </div>
        <div class="progress-track">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="progress-steps" id="progressSteps">
          <span class="active">识别行业场景</span>
          <span>分析 AI 问答需求</span>
          <span>归纳客户顾虑</span>
          <span>匹配 SOLIDWORKS 方案</span>
        </div>
      </section>

      <section class="result-panel hidden" id="resultPanel">
        <div class="result-heading">
          <p>GEO 需求分析结果</p>
          <h2 id="resultHeadline">你的客户在 AI 搜索中暴露出的需求信号</h2>
          <span id="resultSource" class="source-pill">行业库匹配</span>
        </div>
        <p class="result-summary" id="resultSummary"></p>
        <div class="signal-list" id="signalList"></div>
        <div class="solution-strip" id="solutionStrip"></div>
        <div class="result-cta">
          <div>
            <strong id="ctaText">获取完整行业 GEO 需求分析</strong>
            <p>销售或市场团队可以基于这份结果继续制作行业邮件、白皮书、客户案例和预约话术。</p>
          </div>
          <a class="secondary-button" href="mailto:?subject=SOLIDWORKS GEO行业需求分析">转发给团队</a>
        </div>
      </section>
    </main>

    <script src="app.js?v=20260629-4"></script>
  </body>
</html>
